      html += '</div>';
    } else {
      var isMulti = q._type === 'multi';
      for (var j = 0; j < q.options.length; j++) {
        var opt = q.options[j];
        var correctAnswers = Array.isArray(q.answer) ? q.answer : [q.answer];
        var userAns = ans ? (Array.isArray(ans.selected) ? ans.selected : [ans.selected]) : [];
        var isCorrectOpt = correctAnswers.indexOf(opt.label) >= 0;
        var userPicked = userAns.indexOf(opt.label) >= 0;

        var ocls = 'option';
        if (examState.submitted) {
          if (isCorrectOpt && userPicked) ocls += ' correct';
          else if (!isCorrectOpt && userPicked) ocls += ' wrong';
          else if (isCorrectOpt && !userPicked) ocls += ' missed';
        } else {
          if (userPicked) ocls += ' selected';
        }

        var iconHtml = isMulti
          ? '<div class="check-icon">' + (examState.submitted ? (isCorrectOpt ? '✓' : (userPicked ? '✗' : '')) : (userPicked ? '✓' : '')) + '</div>'
          : '<div class="label">' + opt.label + '</div>';

        html += '<div class="' + ocls + '" data-label="' + escAttr(opt.label) + '" ' + (examState.submitted ? '' : 'onclick="examSelect(\'' + escAttr(q.id) + '\',\'' + escAttr(opt.label) + '\',' + i + ')"') + '>'
          + iconHtml + '<span>' + escHtml(opt.text) + '</span></div>';
      }
    }

    if (examState.submitted) {
      var ca = Array.isArray(q.answer) ? q.answer.join(', ') : q.answer;
      if (ans) {
        var resultText = ans.correct ? '✓ 正确' : '✗ 错误';
        var resultColor = ans.correct ? '#16a34a' : '#dc2626';
        html += '<div style="margin-top:12px;padding:8px 12px;border-radius:8px;background:' + (ans.correct ? 'rgba(34,197,94,0.08)' : 'rgba(239,68,68,0.08)') + ';color:' + resultColor + ';font-weight:600;font-size:0.85rem;">';
        html += resultText;
        if (!ans.correct) html += ' · 正确答案：' + ca;
        html += '</div>';
        if (!ans.correct && q.explanation) {
          html += '<div class="explanation-box" style="margin-top:10px;">';
          html += '<div class="expl-title">📖 解析</div>';
          html += '<div>' + escHtml(q.explanation) + '</div>';
          html += '</div>';
        }
      } else {
        html += '<div style="margin-top:12px;padding:8px 12px;border-radius:8px;background:rgba(245,158,11,0.06);color:#d97706;font-weight:600;font-size:0.85rem;">';
        html += '⚠ 未作答 · 正确答案：' + ca;
        html += '</div>';
        if (q.explanation) {
          html += '<div class="explanation-box" style="margin-top:10px;">';
          html += '<div class="expl-title">📖 解析</div>';
          html += '<div>' + escHtml(q.explanation) + '</div>';
          html += '</div>';
        }
      }
    }

    html += '</div>';
  }

  html += '</div>'; // exam-right
  html += '</div>'; // exam-content

  overlay.innerHTML = html;
  document.body.appendChild(overlay);
}

function examSelect(qid, label, qIdx) {
  if (examState.submitted) return;
  var q = examState.questions[qIdx];
  if (!q) return;

  if (q._type === 'multi') {
    var existing = examState.answers[qid];
    var sel = existing ? (Array.isArray(existing.selected) ? existing.selected.slice() : []) : [];
    var idx = sel.indexOf(label);
    if (idx >= 0) sel.splice(idx, 1);
    else sel.push(label);
    examState.answers[qid] = { selected: sel, correct: false, result: 'pending' };
    renderExam();
    var el = document.getElementById('examQ' + qIdx);
    if (el) el.scrollIntoView({behavior:'instant', block:'center'});
  } else {
    examState.answers[qid] = { selected: label, correct: (label === q.answer), result: (label === q.answer ? 'correct' : 'incorrect') };
    if (label !== q.answer) addToWrongBook(q);
    else removeFromWrongBook(q.id);
    // 局部更新，不重建整个DOM
    examUpdateCard(q, qIdx);
  }
}

function examUpdateCard(q, qIdx) {
  var card = document.getElementById('examQ' + qIdx);
  if (!card) { renderExam(); return; }

  // 更新左侧边框色
  var ans = examState.answers[q.id];
  card.style.borderLeftColor = '#2563eb';

  // 更新选项样式
  var isMulti = q._type === 'multi';
  var options = card.querySelectorAll('.option, .tf-btn');
  var userAns = ans ? (Array.isArray(ans.selected) ? ans.selected : [ans.selected]) : [];

  for (var k = 0; k < options.length; k++) {
    var opt = options[k];
    var optLabel = opt.getAttribute('data-label');
    var isPicked = userAns.indexOf(optLabel) >= 0;

    opt.classList.remove('selected', 'correct', 'wrong', 'missed');
    if (isPicked) opt.classList.add('selected');

    // 更新勾选图标
    var icon = opt.querySelector('.check-icon, .label');
    if (icon && isMulti) {
      icon.textContent = isPicked ? '✓' : optLabel;
    }
  }

  // 更新答题卡
  var sheetItem = document.getElementById('examSheetItem' + qIdx);
  if (sheetItem) {
    sheetItem.classList.remove('unanswered');
    sheetItem.classList.add('correct');
  }

  // 更新答题卡进度
  var answered = Object.keys(examState.answers).length;
  var total = examState.questions.length;
  var progressEl = document.getElementById('examSheetProgress');
  if (progressEl) progressEl.textContent = answered + '/' + total;
  var headerProgress = document.getElementById('examProgress');
  if (headerProgress) headerProgress.textContent = '已答 ' + answered + ' / ' + total;
}

function examScrollTo(idx) {
  var el = document.getElementById('examQ' + idx);
  if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
}

function submitExam(autoSubmit) {
  stopExamTimer();
  var total = examState.questions.length;
  var answered = Object.keys(examState.answers).length;
  var unanswered = total - answered;

  if (!autoSubmit && unanswered > 0) {
    if (!confirm('还有 ' + unanswered + ' 题未作答，确定要交卷吗？')) return;
  }

  // 计算多选题正确性
  for (var i = 0; i < examState.questions.length; i++) {
    var q = examState.questions[i];
    var ans = examState.answers[q.id];
    if (!ans) continue;
    if (q._type === 'multi') {
      var correct = q.answer.slice().sort().join(',');
      var user = Array.isArray(ans.selected) ? ans.selected.slice().sort().join(',') : '';
      if (correct === user) { ans.correct = true; ans.result = 'correct'; }
      else if (user === '') { ans.correct = false; ans.result = 'incorrect'; }
      else { ans.correct = false; ans.result = 'incorrect'; }
      if (!ans.correct) addToWrongBook(q);
      else removeFromWrongBook(q.id);
    }
  }

  examState.submitted = true;
  renderExam();

  // 滚动到顶部
  var body = document.getElementById('examScrollBody');
  if (body) body.scrollTop = 0;

  // 显示成绩摘要
  setTimeout(function() { showExamScore(); }, 300);
}

function showExamScore() {
  saveExamRecord();
  var totalScore = 0;
  var maxScore = 0;
  var correctCount = 0;
  var wrongCount = 0;
  var unansweredCount = 0;
  var breakdown = { single:{correct:0,total:0,score:0}, multi:{correct:0,total:0,score:0}, bool:{correct:0,total:0,score:0} };

  for (var i = 0; i < examState.questions.length; i++) {
    var q = examState.questions[i];
    var cfg = EXAM_CONFIG[q._examType];
    var ans = examState.answers[q.id];
    maxScore += cfg.score;
    breakdown[q._examType].total++;
    if (!ans) { unansweredCount++; continue; }
    if (ans.correct) {
      totalScore += cfg.score;
      correctCount++;
      breakdown[q._examType].correct++;
      breakdown[q._examType].score += cfg.score;
    } else { wrongCount++; }
  }

  totalScore = Math.round(totalScore * 10) / 10;
  var accuracy = Math.round(correctCount / examState.questions.length * 100);
  var scoreColor = totalScore >= 60 ? '#16a34a' : '#dc2626';
  var emoji = totalScore >= 90 ? '🏆' : (totalScore >= 80 ? '🎉' : (totalScore >= 60 ? '✅' : '💪'));

  var banner = document.createElement('div');
  banner.id = 'examScoreBanner';
  banner.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:400;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s;';

  var html = '<div style="background:rgba(255,255,255,0.85);backdrop-filter:blur(20px);border-radius:20px;padding:32px;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.15);border:1.5px solid rgba(255,255,255,0.8);text-align:center;">';
  html += '<div style="font-size:3rem;margin-bottom:8px;">' + emoji + '</div>';
  html += '<div style="font-size:3.5rem;font-weight:800;color:' + scoreColor + '">' + totalScore + '</div>';
  html += '<div style="font-size:1.1rem;color:#9ca3af;">/ ' + maxScore + ' 分</div>';
  html += '<div style="font-size:0.9rem;color:#6b7280;margin:12px 0;">正确率 ' + accuracy + '%</div>';

  html += '<div style="display:flex;gap:10px;justify-content:center;margin:16px 0;">';
  var btypes = [{key:'single',l:'单选'},{key:'multi',l:'多选'},{key:'bool',l:'判断'}];
  for (var t = 0; t < btypes.length; t++) {
    var bd = breakdown[btypes[t].key];
    var cfg = EXAM_CONFIG[btypes[t].key];
    html += '<div style="flex:1;text-align:center;padding:10px;background:rgba(239,246,255,0.4);border-radius:10px;">';
    html += '<div style="font-size:1.2rem;font-weight:700;">' + bd.correct + '/' + bd.total + '</div>';
    html += '<div style="font-size:0.72rem;color:#9ca3af;">' + btypes[t].l + ' ' + bd.score + '/' + (bd.total*cfg.score) + '分</div>';
    html += '</div>';
  }
  html += '</div>';

  html += '<div style="font-size:0.82rem;color:#9ca3af;margin-bottom:16px;">正确 ' + correctCount + ' · 错误 ' + wrongCount + ' · 未答 ' + unansweredCount + '</div>';

  html += '<div style="display:flex;gap:10px;justify-content:center;">';
  html += '<button class="btn-retry" onclick="document.getElementById(\'examScoreBanner\').remove()" style="padding:10px 24px;border-radius:10px;font-size:0.9rem;font-weight:600;cursor:pointer;border:none;background:#2563eb;color:#fff;">查看解析</button>';
  html += '<button class="btn-back" onclick="exitExam()" style="padding:10px 24px;border-radius:10px;font-size:0.9rem;font-weight:600;cursor:pointer;border:1.5px solid rgba(226,232,240,0.7);background:rgba(255,255,255,0.6);color:#475569;">返回练习</button>';
  html += '</div>';
  html += '</div>';

  banner.innerHTML = html;
  banner.onclick = function(e) { if (e.target === banner) banner.remove(); };
  document.body.appendChild(banner);
}

function exitExam() {
  stopExamTimer();
  var el1 = document.getElementById('examOverlay');
  if (el1) el1.remove();
  var el2 = document.getElementById('examScoreBanner');
  if (el2) el2.remove();
  examState = { active:false, subject:'', questions:[], answers:{}, submitted:false, startTime:null };
}

function abandonExam() {
  var answered = Object.keys(examState.answers).length;
  var total = examState.questions.length;
  var msg = answered === 0
    ? '确定要放弃本次考试吗？'
    : '已答 ' + answered + '/' + total + ' 题，确定要放弃本次考试吗？';
  if (!confirm(msg)) return;
  exitExam();
}

function retryExam() {
  exitExam();
  startExam(examState.subject);
}


// ==================== 考试记录 ====================
var EXAM_RECORDS_KEY = 'exam_records_v1';

function saveExamRecord() {
  var records = JSON.parse(localStorage.getItem(EXAM_RECORDS_KEY) || '[]');

  var totalScore = 0;
  var correctCount = 0;
  var wrongCount = 0;
  var unansweredCount = 0;
  var breakdown = { single:{correct:0,total:0,score:0}, multi:{correct:0,total:0,score:0}, bool:{correct:0,total:0,score:0} };

  for (var i = 0; i < examState.questions.length; i++) {
    var q = examState.questions[i];
    var cfg = EXAM_CONFIG[q._examType];
    var ans = examState.answers[q.id];
    breakdown[q._examType].total++;
    if (!ans) { unansweredCount++; continue; }
    if (ans.correct) {
      totalScore += cfg.score;
      correctCount++;
      breakdown[q._examType].correct++;
      breakdown[q._examType].score += cfg.score;
    } else { wrongCount++; }
  }
  totalScore = Math.round(totalScore * 10) / 10;

  var maxScore = 0;
  for (var k in EXAM_CONFIG) maxScore += EXAM_CONFIG[k].count * EXAM_CONFIG[k].score;

  records.unshift({
    id: Date.now(),
    subject: examState.subject,
    date: new Date().toLocaleString('zh-CN'),
    totalScore: totalScore,
    maxScore: maxScore,
    total: examState.questions.length,
    correct: correctCount,
    wrong: wrongCount,
    unanswered: unansweredCount,
    breakdown: breakdown,
    duration: Math.round((Date.now() - examState.startTime) / 1000)
  });

  // 最多保留 50 条
  if (records.length > 50) records = records.slice(0, 50);
  localStorage.setItem(EXAM_RECORDS_KEY, JSON.stringify(records));
}

function showExamRecords() {
  var records = JSON.parse(localStorage.getItem(EXAM_RECORDS_KEY) || '[]');

  var overlay = document.createElement('div');
  overlay.className = 'wrong-book-overlay';
  overlay.id = 'examRecordsOverlay';
  overlay.onclick = function(e) { if (e.target === overlay) closeExamRecords(); };

  var panel = '<div class="wrong-book-panel" style="max-width:520px;max-height:85vh;">';
  panel += '<div class="wrong-book-header"><h3>📊 考试记录</h3><button class="wrong-book-close" onclick="closeExamRecords()">x</button></div>';

  if (records.length === 0) {
    panel += '<div style="text-align:center;padding:60px 20px;color:#9ca3af;">';
    panel += '<div style="font-size:3rem;margin-bottom:12px;">📋</div>';
    panel += '<p>暂无考试记录</p></div>';
  } else {
    panel += '<div style="flex:1;overflow-y:auto;padding:12px 16px;">';

    // 统计概览
    var totalExams = records.length;
    var avgScore = 0;
    var bestScore = 0;
    for (var r = 0; r < records.length; r++) {
      avgScore += records[r].totalScore;
      if (records[r].totalScore > bestScore) bestScore = records[r].totalScore;
    }
    avgScore = Math.round(avgScore / totalExams * 10) / 10;

    panel += '<div style="display:flex;gap:10px;margin-bottom:16px;">';
    panel += '<div style="flex:1;text-align:center;padding:14px;background:#f0f7ff;border-radius:12px;">';
    panel += '<div style="font-size:1.5rem;font-weight:700;color:#2563eb;">' + totalExams + '</div>';
    panel += '<div style="font-size:0.72rem;color:#9ca3af;">考试次数</div></div>';
    panel += '<div style="flex:1;text-align:center;padding:14px;background:#f0fdf4;border-radius:12px;">';
    panel += '<div style="font-size:1.5rem;font-weight:700;color:#16a34a;">' + avgScore + '</div>';
    panel += '<div style="font-size:0.72rem;color:#9ca3af;">平均分</div></div>';
    panel += '<div style="flex:1;text-align:center;padding:14px;background:rgba(245,158,11,0.06);border-radius:12px;">';
    panel += '<div style="font-size:1.5rem;font-weight:700;color:#d97706;">' + bestScore + '</div>';
    panel += '<div style="font-size:0.72rem;color:#9ca3af;">最高分</div></div>';
    panel += '</div>';

    // 记录列表
    for (var i = 0; i < records.length; i++) {
      var rec = records[i];
      var scoreColor = rec.totalScore >= 60 ? '#16a34a' : '#dc2626';
      var emoji = rec.totalScore >= 90 ? '🏆' : (rec.totalScore >= 80 ? '🎉' : (rec.totalScore >= 60 ? '✅' : '💪'));
      var duration = rec.duration || 0;
      var min = Math.floor(duration / 60);
      var sec = duration % 60;

      panel += '<div class="exam-record-item">';
      panel += '<div style="display:flex;align-items:center;justify-content:space-between;">';
      panel += '<div style="display:flex;align-items:center;gap:10px;">';
      panel += '<span style="font-size:1.3rem;">' + emoji + '</span>';
      panel += '<div>';
      panel += '<div style="font-size:0.9rem;font-weight:600;color:#1f2937;">' + escHtml(rec.subject) + '</div>';
      panel += '<div class="exam-record-meta">' + rec.date;
      if (duration > 0) panel += ' · 用时 ' + min + '分' + sec + '秒';
      panel += '</div>';
      panel += '</div></div>';
      panel += '<div class="exam-record-score" style="color:' + scoreColor + '">' + rec.totalScore + '<span style="font-size:0.8rem;color:#9ca3af;font-weight:400;"> / ' + rec.maxScore + '</span></div>';
      panel += '</div>';

      panel += '<div class="exam-record-detail-row">';
      panel += '<span class="exam-record-detail-item">✓ 正确 ' + rec.correct + '</span>';
      panel += '<span class="exam-record-detail-item">✗ 错误 ' + rec.wrong + '</span>';
      panel += '<span class="exam-record-detail-item">— 未答 ' + rec.unanswered + '</span>';
      if (rec.breakdown) {
        var bd = rec.breakdown;
        panel += '<span class="exam-record-detail-item">单选 ' + bd.single.correct + '/' + bd.single.total + '</span>';
        panel += '<span class="exam-record-detail-item">多选 ' + bd.multi.correct + '/' + bd.multi.total + '</span>';
        panel += '<span class="exam-record-detail-item">判断 ' + bd.bool.correct + '/' + bd.bool.total + '</span>';
      }
      panel += '</div>';

      panel += '<div style="display:flex;gap:6px;margin-top:8px;">';
      panel += '<button onclick="deleteExamRecord(' + rec.id + ')" style="padding:4px 10px;border-radius:6px;font-size:0.72rem;cursor:pointer;border:1px solid #fecaca;background:#fef2f2;color:#dc2626;">删除</button>';
      panel += '</div>';

      panel += '</div>';
    }

    panel += '</div>';

    // 底部清空按钮
    panel += '<div style="padding:12px 16px;border-top:1px solid #e5e7eb;text-align:right;">';
    panel += '<button onclick="clearExamRecords()" style="padding:6px 16px;border-radius:8px;font-size:0.82rem;cursor:pointer;border:1.5px solid #fecaca;background:#fef2f2;color:#dc2626;">清空全部记录</button>';
    panel += '</div>';
  }

  panel += '</div>';
  overlay.innerHTML = panel;
  document.body.appendChild(overlay);
}

function closeExamRecords() {
  var el = document.getElementById('examRecordsOverlay');
  if (el) el.remove();
}

function deleteExamRecord(id) {
  var records = JSON.parse(localStorage.getItem(EXAM_RECORDS_KEY) || '[]');
  records = records.filter(function(r) { return r.id !== id; });
  localStorage.setItem(EXAM_RECORDS_KEY, JSON.stringify(records));
  closeExamRecords();
  showExamRecords();
}

function clearExamRecords() {
  if (!confirm('确定清空所有考试记录吗？')) return;
  localStorage.removeItem(EXAM_RECORDS_KEY);
  closeExamRecords();
}


</script>
